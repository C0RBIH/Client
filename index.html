<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSC VPN – Happ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0d15;
            color: #eef2fb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 440px;
            width: 100%;
            background: #131720;
            border-radius: 32px;
            padding: 36px 28px 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.04);
            text-align: center;
        }

        /* ---------- ЭКРАН ЗАГРУЗКИ (MSC Лого в центре круга) ---------- */
        .loader-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            padding: 16px 0 12px;
        }

        .loader-spinner-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 4px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid rgba(59, 130, 246, 0.1);
            border-top-color: #3b82f6;
            border-right-color: #60a5fa;
            animation: spin 1.2s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .center-logo-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #131720;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .center-logo-wrapper img {
            width: 90%;
            height: 90%;
            object-fit: contain;
            border-radius: 50%;
        }

        .loader-text {
            font-size: 16px;
            font-weight: 500;
            color: #94a3b8;
        }

        .loader-text strong {
            color: #eef2fb;
            font-weight: 600;
        }

        .countdown {
            font-size: 28px;
            font-weight: 700;
            color: #60a5fa;
            letter-spacing: 2px;
            margin-top: -6px;
        }

        .progress-bar {
            width: 100%;
            max-width: 200px;
            height: 4px;
            background: #1e293b;
            border-radius: 8px;
            overflow: hidden;
            margin-top: -4px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 8px;
            animation: loadProgress 3s linear forwards;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* ---------- ОСНОВНОЙ ЭКРАН ---------- */
        .main-section {
            display: none;
            animation: fadeUp 0.5s ease forwards;
        }

        .main-section.visible {
            display: block;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .main-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            color: #eef2fb;
        }

        /* ---------- КАРТОЧКА HAPP ---------- */
        .happ-card {
            background: #1a1f2e;
            border-radius: 24px;
            padding: 32px 20px 28px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: border-color 0.3s;
            margin-bottom: 10px;
        }

        .happ-card:hover {
            border-color: rgba(96, 165, 250, 0.2);
        }

        /* Блок под новую квадратную иконку Happ */
        .happ-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            overflow: hidden;
        }

        .happ-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .happ-name {
            font-size: 22px;
            font-weight: 700;
            color: #eef2fb;
            letter-spacing: -0.3px;
        }

        .happ-desc {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 4px;
            margin-bottom: 20px;
        }

        .open-btn {
            background: #3b82f6;
            border: none;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            padding: 14px 32px;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            max-width: 200px;
            display: inline-block;
            text-decoration: none;
        }

        .open-btn:hover {
            background: #2563eb;
        }

        .open-btn:active {
            transform: scale(0.97);
        }

        .footer-note {
            margin-top: 28px;
            font-size: 13px;
            color: #475569;
            border-top: 1px solid #1e293b;
            padding-top: 18px;
        }

        .footer-note a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }

        /* адаптив */
        @media (max-width: 480px) {
            .container {
                padding: 24px 16px 28px;
            }
            .loader-spinner-container {
                width: 110px;
                height: 110px;
            }
            .center-logo-wrapper {
                width: 66px;
                height: 66px;
            }
            .happ-icon {
                width: 64px;
                height: 64px;
            }
            .happ-name {
                font-size: 20px;
            }
            .open-btn {
                font-size: 15px;
                padding: 12px 28px;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
